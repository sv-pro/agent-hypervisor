name: simulate_world
mode: curated
description: >
  Same read/test surface as rendered_world, plus a simulated push path.
  git_push_simulated exists ontologically — the agent can traverse the push
  path — but the side effect is captured and echoed, not executed against
  the real remote. Dangerous actions are rendered as simulations.
tools:
  - read_file
  - grep_code
  - list_files
  - run_tests
  - git_push_simulated
