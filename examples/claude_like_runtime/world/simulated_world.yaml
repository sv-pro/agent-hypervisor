name: simulated_world
description: >
  Same read/test action space as rendered_world, plus a simulated push binding.
  git_push_simulated exists ontologically — the agent can traverse the full
  push path — but its side effect is captured in the simulation layer, not
  executed against the real remote. All actions in this world are
  simulation-bound: rendered reality, not real execution.
action_space:
  - read_file
  - grep_code
  - list_files
  - run_tests
  - git_push_simulated
simulation_bindings:
  - read_file
  - grep_code
  - list_files
  - run_tests
  - git_push_simulated
