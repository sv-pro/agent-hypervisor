name: Publish Pages

on:
  push:
    branches:
      - dev
    paths:
      - 'index.html'
      - 'presentation-core/**'
      - 'presentation-enterprise/**'
      - 'presentation-faq/**'
      - '.github/workflows/publish-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site/presentation-core
          mkdir -p _site/presentation-enterprise
          mkdir -p _site/presentation-faq
          cp index.html _site/
          cp -r presentation-core/. _site/presentation-core/
          cp -r presentation-enterprise/. _site/presentation-enterprise/
          cp -r presentation-faq/. _site/presentation-faq/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
